<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLH10 PDP-10 Emulator - WebAssembly</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #4fc3f7;
            margin-bottom: 30px;
        }
        .terminal-container {
            background-color: #000;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 20px;
        }
        .controls {
            text-align: center;
            margin-bottom: 20px;
        }
        button {
            background-color: #4fc3f7;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin: 0 10px;
        }
        button:hover {
            background-color: #29b6f6;
        }
        button:disabled {
            background-color: #666;
            cursor: not-allowed;
        }
        .status {
            text-align: center;
            margin: 10px 0;
            font-size: 14px;
        }
        .status.loading {
            color: #ffb74d;
        }
        .status.ready {
            color: #81c784;
        }
        .status.error {
            color: #e57373;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>KLH10 PDP-10 Emulator</h1>
        
        <div class="status" id="status">Initializing...</div>
        
        <div class="controls">
            <button id="startBtn" disabled>Start Emulator</button>
            <button id="resetBtn" disabled>Reset</button>
        </div>
        
        <div class="terminal-container">
            <div id="terminal"></div>
        </div>
        
        <div style="text-align: center; font-size: 12px; color: #888; margin-top: 20px;">
            KLH10 PDP-10 Emulator compiled to WebAssembly with Emscripten<br>
            Original emulator by Kenneth L. Harrenstien
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="main.js"></script>
</body>
</html>
